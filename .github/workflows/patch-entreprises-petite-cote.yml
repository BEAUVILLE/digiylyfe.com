name: Ajouter la porte Entreprises Petite Côte

on:
  push:
    branches:
      - agent/entreprises-petite-cote
    paths:
      - .github/workflows/patch-entreprises-petite-cote.yml

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer la branche
        uses: actions/checkout@v4
        with:
          ref: agent/entreprises-petite-cote
          fetch-depth: 0

      - name: Ajouter la section Entreprises Petite Côte
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("index.html")
          source = path.read_text(encoding="utf-8")

          if 'id="entreprises-petite-cote"' in source:
              print("La section existe déjà.")
              raise SystemExit(0)

          css_anchor = "/* ── Quartiers de la ville ── */"
          css = r'''/* ── Porte Entreprises Petite Côte ── */
          .enterpriseSection{
            position:relative;
            overflow:hidden;
            border-color:rgba(246,196,83,.58);
            background:
              radial-gradient(560px 250px at 8% 0,rgba(246,196,83,.20),transparent 65%),
              radial-gradient(520px 230px at 100% 100%,rgba(34,197,94,.16),transparent 62%),
              linear-gradient(155deg,rgba(9,47,31,.96),rgba(4,20,14,.96));
            box-shadow:0 24px 64px rgba(0,0,0,.30);
          }
          .enterpriseKicker{
            display:inline-flex;align-items:center;gap:7px;
            padding:7px 11px;border-radius:999px;
            border:1px solid rgba(246,196,83,.44);
            background:rgba(246,196,83,.11);color:#fff3cf;
            font-size:11px;font-weight:1000;letter-spacing:.09em;text-transform:uppercase;
          }
          .enterpriseTitle{margin:12px 0 7px;font-size:clamp(26px,6.6vw,46px);line-height:.96;font-weight:1000;letter-spacing:-.045em}
          .enterpriseLead{max-width:820px!important;font-size:clamp(15px,3.8vw,19px)!important;line-height:1.48!important;color:rgba(255,250,240,.88)!important}
          .enterprisePromise{margin-top:14px;border-radius:22px;border:1px solid rgba(246,196,83,.40);background:rgba(255,255,255,.07);padding:14px}
          .enterprisePromise strong{display:block;color:#fff3cf;font-size:clamp(18px,4.7vw,25px);line-height:1.1;font-weight:1000}
          .enterprisePromise span{display:block;margin-top:6px;color:rgba(255,250,240,.78);font-size:13px;line-height:1.45;font-weight:900}
          .enterpriseGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:12px}
          .enterpriseCard{border-radius:20px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.065);padding:14px;box-shadow:0 12px 28px rgba(0,0,0,.18)}
          .enterpriseCard i{display:block;font-style:normal;font-size:27px;line-height:1;margin-bottom:8px}
          .enterpriseCard strong{display:block;color:#fffaf0;font-size:15px;line-height:1.15;font-weight:1000}
          .enterpriseCard span{display:block;margin-top:6px;color:rgba(255,250,240,.72);font-size:12px;line-height:1.38;font-weight:850}
          .enterpriseSectors{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
          .enterpriseSectors span{padding:7px 10px;border-radius:999px;border:1px solid rgba(34,197,94,.32);background:rgba(34,197,94,.10);color:#eafff3;font-size:11.5px;font-weight:950}
          .enterpriseNote{margin:13px 0 0!important;padding:12px;border-radius:17px;border:1px dashed rgba(246,196,83,.42);background:rgba(246,196,83,.07);color:rgba(255,250,240,.82)!important;font-size:12.5px!important;line-height:1.45!important;font-weight:900!important}
          .enterpriseActions{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}
          .enterpriseActions a{min-height:48px;padding:0 15px;border-radius:999px;border:1px solid rgba(246,196,83,.38);background:rgba(255,255,255,.08);display:inline-flex;align-items:center;justify-content:center;text-align:center;font-size:13px;font-weight:1000}
          .enterpriseActions a.gold{background:linear-gradient(135deg,#fff1bd,#f6c453,#22c55e);color:#06140f;border-color:rgba(246,196,83,.78)}
          @media(max-width:820px){.enterpriseGrid{grid-template-columns:repeat(2,1fr)}}
          @media(max-width:680px){.enterpriseGrid{grid-template-columns:1fr}.enterpriseActions{display:grid;grid-template-columns:1fr}.enterpriseActions a{width:100%;min-height:52px}}
          '''
          if css_anchor not in source:
              raise SystemExit("Ancre CSS introuvable")
          source = source.replace(css_anchor, css + "\n\n" + css_anchor, 1)

          html_anchor = "<!-- ═══ Les quartiers de la ville ═══ -->"
          html = r'''<!-- ═══ Entreprises de la Petite Côte ═══ -->
          <section class="section enterpriseSection" id="entreprises-petite-cote" aria-label="Présence numérique des entreprises de la Petite Côte">
            <span class="enterpriseKicker" data-i18n="enterpriseKicker">Nouvelle porte · Entreprises déjà initiées</span>
            <h2 class="enterpriseTitle" data-i18n="enterpriseTitle">🏢 Entreprises de la Petite Côte</h2>
            <p class="enterpriseLead" data-i18n="enterpriseLead">Votre entreprise est déjà active. DIGIYLYFE organise et renforce sa présence numérique locale : une vitrine claire, une carte professionnelle avec QR et une route directe vers vos clients.</p>

            <div class="enterprisePromise">
              <strong data-i18n="enterprisePromiseStrong">Visible, identifiable et joignable en un scan.</strong>
              <span data-i18n="enterprisePromiseText">Pour les hôtels, résidences, écoles, agences, cabinets, sociétés de services, ateliers, entreprises BTP, maintenance, transport et PME locales.</span>
            </div>

            <div class="enterpriseGrid" aria-label="Bénéfices de la présence entreprise">
              <article class="enterpriseCard"><i>🌐</i><strong data-i18n="enterpriseCard1Title">Vitrine professionnelle</strong><span data-i18n="enterpriseCard1Text">Services, réalisations, horaires, localisation et image cohérente sur téléphone.</span></article>
              <article class="enterpriseCard"><i>▣</i><strong data-i18n="enterpriseCard2Title">Carte & QR officiel</strong><span data-i18n="enterpriseCard2Text">Une carte partageable, imprimable et scannable lors des rendez-vous.</span></article>
              <article class="enterpriseCard"><i>📩</i><strong data-i18n="enterpriseCard3Title">Contact & devis directs</strong><span data-i18n="enterpriseCard3Text">WhatsApp, téléphone, demande de devis ou réservation sans détour.</span></article>
              <article class="enterpriseCard"><i>🤝</i><strong data-i18n="enterpriseCard4Title">Accompagnement terrain</strong><span data-i18n="enterpriseCard4Text">Nous aidons à choisir quoi montrer, quoi protéger et comment partager.</span></article>
            </div>

            <div class="enterpriseSectors" aria-label="Secteurs entreprises Petite Côte">
              <span data-i18n="enterpriseSector1">Hôtels & résidences</span>
              <span data-i18n="enterpriseSector2">Agences immobilières</span>
              <span data-i18n="enterpriseSector3">Écoles & centres</span>
              <span data-i18n="enterpriseSector4">Cabinets & agences</span>
              <span data-i18n="enterpriseSector5">BTP · maintenance · climatisation</span>
              <span data-i18n="enterpriseSector6">Transport & services</span>
            </div>

            <p class="enterpriseNote" data-i18n="enterpriseNote">Ce n’est pas un nouveau gros module. C’est une porte claire qui rassemble la vitrine, le QR, le contact direct et, selon le besoin, JOBS, RESA, PAY, LOC, MARKET ou BUILD.</p>

            <div class="enterpriseActions">
              <a class="gold" href="./presence-terrain.html" data-i18n="enterpriseCta1">▣ Découvrir la présence entreprise</a>
              <a href="./inscription.html" data-i18n="enterpriseCta2">📝 Demander ma vitrine entreprise</a>
              <a href="#quartiers" data-i18n="enterpriseCta3">🧭 Voir les modules disponibles</a>
            </div>
          </section>
          '''
          if html_anchor not in source:
              raise SystemExit("Ancre HTML introuvable")
          source = source.replace(html_anchor, html + "\n\n" + html_anchor, 1)

          menu_anchor = '      <a class="gold" href="./presence-terrain.html">▣ <span data-i18n="menuPresence">Pack Présence Terrain</span></a>'
          menu_link = menu_anchor + '\n      <a class="gold" href="#entreprises-petite-cote">🏢 <span data-i18n="menuEntreprise">Entreprises Petite Côte</span></a>'
          if menu_anchor not in source:
              raise SystemExit("Ancre menu introuvable")
          source = source.replace(menu_anchor, menu_link, 1)

          footer_anchor = '  <a href="./presence-terrain.html" data-i18n="footerPresence">Pack Présence Terrain</a> ·'
          footer_link = footer_anchor + '\n  <a href="#entreprises-petite-cote" data-i18n="footerEntreprise">Entreprises Petite Côte</a> ·'
          if footer_anchor not in source:
              raise SystemExit("Ancre footer introuvable")
          source = source.replace(footer_anchor, footer_link, 1)

          fr_anchor = '      quartiersTitle:"🏙️ Les quartiers de la ville",'
          fr_keys = '''      enterpriseKicker:"Nouvelle porte · Entreprises déjà initiées",
                enterpriseTitle:"🏢 Entreprises de la Petite Côte",
                enterpriseLead:"Votre entreprise est déjà active. DIGIYLYFE organise et renforce sa présence numérique locale : une vitrine claire, une carte professionnelle avec QR et une route directe vers vos clients.",
                enterprisePromiseStrong:"Visible, identifiable et joignable en un scan.",
                enterprisePromiseText:"Pour les hôtels, résidences, écoles, agences, cabinets, sociétés de services, ateliers, entreprises BTP, maintenance, transport et PME locales.",
                enterpriseCard1Title:"Vitrine professionnelle",enterpriseCard1Text:"Services, réalisations, horaires, localisation et image cohérente sur téléphone.",
                enterpriseCard2Title:"Carte & QR officiel",enterpriseCard2Text:"Une carte partageable, imprimable et scannable lors des rendez-vous.",
                enterpriseCard3Title:"Contact & devis directs",enterpriseCard3Text:"WhatsApp, téléphone, demande de devis ou réservation sans détour.",
                enterpriseCard4Title:"Accompagnement terrain",enterpriseCard4Text:"Nous aidons à choisir quoi montrer, quoi protéger et comment partager.",
                enterpriseSector1:"Hôtels & résidences",enterpriseSector2:"Agences immobilières",enterpriseSector3:"Écoles & centres",enterpriseSector4:"Cabinets & agences",enterpriseSector5:"BTP · maintenance · climatisation",enterpriseSector6:"Transport & services",
                enterpriseNote:"Ce n’est pas un nouveau gros module. C’est une porte claire qui rassemble la vitrine, le QR, le contact direct et, selon le besoin, JOBS, RESA, PAY, LOC, MARKET ou BUILD.",
                enterpriseCta1:"▣ Découvrir la présence entreprise",enterpriseCta2:"📝 Demander ma vitrine entreprise",enterpriseCta3:"🧭 Voir les modules disponibles",
                menuEntreprise:"Entreprises Petite Côte",footerEntreprise:"Entreprises Petite Côte",
          '''
          if fr_anchor not in source:
              raise SystemExit("Ancre i18n FR introuvable")
          source = source.replace(fr_anchor, fr_keys + fr_anchor, 1)

          en_anchor = '      quartiersTitle:"🏙️ The districts of the city",'
          en_keys = '''      enterpriseKicker:"New doorway · Digitally ready businesses",
                enterpriseTitle:"🏢 Petite Côte businesses",
                enterpriseLead:"Your company is already active. DIGIYLYFE organizes and strengthens its local digital presence: a clear showcase, a professional QR business card and a direct road to your clients.",
                enterprisePromiseStrong:"Visible, identifiable and reachable in one scan.",
                enterprisePromiseText:"For hotels, residences, schools, agencies, firms, service companies, workshops, construction, maintenance, transport and local SMEs.",
                enterpriseCard1Title:"Professional showcase",enterpriseCard1Text:"Services, work, opening hours, location and a consistent mobile image.",
                enterpriseCard2Title:"Official card & QR",enterpriseCard2Text:"A shareable, printable and scannable card for meetings and the field.",
                enterpriseCard3Title:"Direct contact & quotes",enterpriseCard3Text:"WhatsApp, phone, quote request or booking without detours.",
                enterpriseCard4Title:"Field support",enterpriseCard4Text:"We help choose what to show, what to protect and how to share it.",
                enterpriseSector1:"Hotels & residences",enterpriseSector2:"Real-estate agencies",enterpriseSector3:"Schools & training",enterpriseSector4:"Firms & agencies",enterpriseSector5:"Construction · maintenance · air conditioning",enterpriseSector6:"Transport & services",
                enterpriseNote:"This is not another large module. It is a clear doorway combining the showcase, QR, direct contact and, when needed, JOBS, RESA, PAY, LOC, MARKET or BUILD.",
                enterpriseCta1:"▣ Discover business presence",enterpriseCta2:"📝 Request my business showcase",enterpriseCta3:"🧭 View available modules",
                menuEntreprise:"Petite Côte businesses",footerEntreprise:"Petite Côte businesses",
          '''
          if en_anchor not in source:
              raise SystemExit("Ancre i18n EN introuvable")
          source = source.replace(en_anchor, en_keys + en_anchor, 1)

          source = re.sub(
              r'<meta name="digiy-build" content="[^"]+">',
              '<meta name="digiy-build" content="index-place-centrale-portes-qr-astou-entreprises-petite-cote-20260711">',
              source,
              count=1,
          )

          path.write_text(source, encoding="utf-8")
          print("Section Entreprises Petite Côte ajoutée.")

      - name: Vérifier les marqueurs
        run: |
          grep -q 'id="entreprises-petite-cote"' index.html
          grep -q 'enterpriseTitle' index.html
          grep -q 'menuEntreprise' index.html
          grep -q 'index-place-centrale-portes-qr-astou-entreprises-petite-cote-20260711' index.html

      - name: Enregistrer la modification
        run: |
          git config user.name "DIGIYLYFE Builder"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "Ajoute la porte Entreprises Petite Côte"
          git push origin HEAD:agent/entreprises-petite-cote
