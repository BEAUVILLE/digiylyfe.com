name: Corriger recherche cartes officielles

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/corriger-recherche-cartes.yml

permissions:
  contents: write

jobs:
  corriger:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Corriger recherche.html
        shell: python
        run: |
          from pathlib import Path

          path = Path("recherche.html")
          text = path.read_text(encoding="utf-8")

          text = text.replace(
              '<meta name="digiy-search" content="recherche-client-build-v2-20260714">',
              '<meta name="digiy-search" content="recherche-client-cartes-officielles-v3-20260714">'
          )

          text = text.replace(
              'https://kourant.digiylyfe.com/carte-visite.png"',
              'https://kourant.digiylyfe.com/carte-visite.png?v=20260714-v3"'
          )
          text = text.replace(
              'https://mbaye-macon.digiylyfe.com/carte-visite.png"',
              'https://mbaye-macon.digiylyfe.com/carte-visite.png?v=20260714-v3"'
          )

          text = text.replace(
              '.avatar img{width:100%;height:100%;object-fit:cover;display:block}',
              '.avatar img{width:100%;height:100%;object-fit:contain;display:block;background:#f7faf8;padding:3px}'
          )

          anchor = '  function headers(){return {"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY};}\n'
          helper = '''  function forceOfficialProfile(pro){
    const phone=digits(pro.whatsapp||pro.telephone);
    const name=norm(pro.nom_public);
    if(phone==="221772084781"||name.includes("kourant")||name.includes("zal & kourant")){
      return {...pro,slug:"partenaires-kourant",nom_public:"Kourant Électricien",metier:"Électricien · installation · rénovation · dépannage",ville:"Saly",quartier:"Petite Côte",whatsapp:"221772084781",telephone:"+221772084781",photo_url:"https://kourant.digiylyfe.com/carte-visite.png?v=20260714-v3",url_fiche:"https://kourant.digiylyfe.com/",module:"BUILD",verifie:true};
    }
    if(phone==="221776427113"||name.includes("mbaye diouf")){
      return {...pro,slug:"partenaires-mbaye",nom_public:"Mbaye Diouf",metier:"Entrepreneur maçon · villas · piscines · rénovation",ville:"Saly / Mbour / Thiès",quartier:"Petite Côte",whatsapp:"221776427113",telephone:"+221776427113",photo_url:"https://mbaye-macon.digiylyfe.com/carte-visite.png?v=20260714-v3",url_fiche:"https://mbaye-macon.digiylyfe.com/",module:"BUILD",verifie:true};
    }
    return pro;
  }
'''
          if 'function forceOfficialProfile(pro)' not in text:
              text = text.replace(anchor, anchor + '\n' + helper)

          text = text.replace(
              'cachedPros=dedupe([...build,...STATIC_BUILD,...central]);',
              'cachedPros=dedupe([...STATIC_BUILD,...build,...central].map(forceOfficialProfile));'
          )
          text = text.replace('>Voir la vitrine</a>', '>Voir la dernière fiche</a>')

          path.write_text(text, encoding="utf-8")

      - name: Contrôler les corrections
        run: |
          grep -q 'forceOfficialProfile' recherche.html
          grep -q 'carte-visite.png?v=20260714-v3' recherche.html
          grep -q 'https://kourant.digiylyfe.com/' recherche.html
          grep -q 'https://mbaye-macon.digiylyfe.com/' recherche.html

      - name: Enregistrer la correction
        run: |
          git config user.name "DIGIYLYFE Bot"
          git config user.email "actions@users.noreply.github.com"
          rm -f .github/workflows/corriger-recherche-cartes.yml
          git add recherche.html .github/workflows/corriger-recherche-cartes.yml
          git commit -m "Afficher les dernières cartes et fiches dans la recherche client"
          git push
