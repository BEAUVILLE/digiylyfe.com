name: Finaliser la page tarif entreprise

on:
  push:
    branches:
      - agent/tunnel-tarif-entreprise
    paths:
      - .github/workflows/patch-tunnel-tarif-entreprise.yml

permissions:
  contents: write

jobs:
  patch-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tunnel-tarif-entreprise
          fetch-depth: 0

      - name: Ajouter l’ancre engagement
        shell: python
        run: |
          from pathlib import Path
          path=Path('tarif-entreprise-petite-cote.html')
          source=path.read_text(encoding='utf-8')
          old='<section class="block commit">'
          new='<section class="block commit" id="engagement">'
          if old not in source:
            if 'id="engagement"' in source:
              raise SystemExit(0)
            raise SystemExit('Ancre engagement introuvable')
          path.write_text(source.replace(old,new,1),encoding='utf-8')

      - name: Vérifier et enregistrer
        run: |
          grep -q 'id="engagement"' tarif-entreprise-petite-cote.html
          git config user.name "DIGIYLYFE Builder"
          git config user.email "actions@users.noreply.github.com"
          git add tarif-entreprise-petite-cote.html
          git commit -m "Ajoute l’ancre de validation du tarif"
          git push origin HEAD:agent/tunnel-tarif-entreprise
