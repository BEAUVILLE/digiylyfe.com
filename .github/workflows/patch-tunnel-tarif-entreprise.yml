name: Recâbler le tunnel tarif entreprise

on:
  push:
    branches:
      - agent/tunnel-tarif-entreprise
    paths:
      - .github/workflows/patch-tunnel-tarif-entreprise.yml

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tunnel-tarif-entreprise
          fetch-depth: 0

      - name: Diriger la porte entreprise vers le tarif dédié
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('index.html')
          source = path.read_text(encoding='utf-8')

          replacements = [
            (
              '<a class="gold" href="./presence-terrain.html" data-i18n="enterpriseCta1">▣ Découvrir la présence entreprise</a>',
              '<a class="gold" href="./tarif-entreprise-petite-cote.html" data-i18n="enterpriseCta1">💰 Voir le tarif · 19 900 FCFA / mois</a>'
            ),
            (
              '<a href="./inscription.html" data-i18n="enterpriseCta2">📝 Demander ma vitrine entreprise</a>',
              '<a href="./tarif-entreprise-petite-cote.html#engagement" data-i18n="enterpriseCta2">✅ Comprendre et valider l’abonnement</a>'
            ),
            (
              'enterpriseCta1:"▣ Découvrir la présence entreprise",enterpriseCta2:"📝 Demander ma vitrine entreprise",enterpriseCta3:"🧭 Voir les modules disponibles",',
              'enterpriseCta1:"💰 Voir le tarif · 19 900 FCFA / mois",enterpriseCta2:"✅ Comprendre et valider l’abonnement",enterpriseCta3:"🧭 Voir les modules disponibles",'
            ),
            (
              'enterpriseCta1:"▣ Discover business presence",enterpriseCta2:"📝 Request my business showcase",enterpriseCta3:"🧭 View available modules",',
              'enterpriseCta1:"💰 View pricing · 19,900 FCFA / month",enterpriseCta2:"✅ Understand and confirm the subscription",enterpriseCta3:"🧭 View available modules",'
            )
          ]

          for old, new in replacements:
            if old not in source:
              raise SystemExit('Ancre introuvable: ' + old[:90])
            source = source.replace(old, new, 1)

          source = re.sub(
            r'<meta name="digiy-build" content="[^"]+">',
            '<meta name="digiy-build" content="index-entreprises-tunnel-tarif-clair-20260711">',
            source,
            count=1
          )

          path.write_text(source, encoding='utf-8')

      - name: Vérifier le tunnel
        run: |
          grep -q './tarif-entreprise-petite-cote.html' index.html
          grep -q '19 900 FCFA / mois' index.html
          grep -q 'Comprendre et valider l’abonnement' index.html
          grep -q 'index-entreprises-tunnel-tarif-clair-20260711' index.html

      - name: Enregistrer la correction
        run: |
          git config user.name "DIGIYLYFE Builder"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "Dirige les entreprises vers le tarif avant inscription"
          git push origin HEAD:agent/tunnel-tarif-entreprise
