<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QR DIGIYLYFE</title>
<meta name="robots" content="noindex,nofollow"/>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f8f3e7;color:#07140f;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  main{width:min(92vw,620px);text-align:center;padding:28px}
  .card{background:white;border-radius:30px;padding:28px;box-shadow:0 18px 50px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.08)}
  img{width:min(78vw,420px);height:auto;display:block;margin:auto}
  h1{margin:18px 0 8px;font-size:clamp(28px,7vw,54px);letter-spacing:.06em}
  p{margin:0 0 18px;font-weight:800;color:#385047}
  a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border-radius:999px;background:#07140f;color:white;text-decoration:none;font-weight:1000}
  @media print{body{background:white} .card{box-shadow:none;border:0} a{display:none}}
</style>
</head>
<body>
<main>
  <section class="card">
    <img src="./digiylyfe-qr.png" alt="QR DIGIYLYFE vers https://digiylyfe.com/"/>
    <h1>DIGIYLYFE</h1>
    <p>Scanne · Clique · Avance</p>
    <a href="https://digiylyfe.com/">Ouvrir DIGIYLYFE</a>
  </section>
</main>
</body>
</html>
